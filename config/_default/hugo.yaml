# ================================================================= #
# *                                                               * #
# *                        Global settings                        * #
# *                                                               * #
# ================================================================= #

baseURL: https://s1lver-lining.github.io
locale: en-us
title: Silver Lining
theme: hextra
ignoreFiles: ["README.md", "TODO.md"]



# ================================================================= #
# *                                                               * #
# *                       Theme parameters                        * #
# *                                                               * #
# ================================================================= #

params:
  footer:
    enable: false
  navbar:
    displayLogo: false
  theme:
    default: system
    displayToggle: false
  editURL:
    enable: true

  


# ================================================================= #
# *                                                               * #
# *                               Menu                            * #
# *                                                               * #
# ================================================================= #

menu:
  main:
    - name: Notes
      pageRef: /sl
      weight: 100
    - name: Write-Ups
      pageRef: /wu
      weight: 200
    - name: Toggle
      weight: 300
      params:
        type: toggle
    - name: Search
      weight: 400
      params:
        type: search


# ================================================================= #
# *                                                               * #
# *                        Markup configs                         * #
# *                                                               * #
# ================================================================= #

markup:
  goldmark:
    renderer:
      # Render raw HTML in the (trusted, self-authored) content instead of
      # dropping it. Also silences the "Raw HTML omitted while rendering" warnings.
      unsafe: true
    extensions:
      # Enable LaTeX math: the hextra render hook (render-passthrough.html)
      # passes the delimited content to KaTeX. Single $...$ inline and $$...$$
      # block are included alongside the \(...\) / \[...\] forms.
      passthrough:
        enable: true
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)'], ['$', '$']]
