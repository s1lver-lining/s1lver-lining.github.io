{{- $name := .Get "name" -}}
<div>
<div id="definition-callout" class="callout hx:pl-4 hx:py-2 hx:mt-5 hx:border-l-4 hx:border-l-verdant-500" >
  {{- if $name -}}
  <div class="hx:pb-2">
    <strong class="hx:font-bold hx:text-verdant-500 hx:dark:text-verdant-600">{{ $name }}</strong>
  </div>
  {{- end -}}
  <span class="hx:block">{{- .Inner | markdownify -}}</span>
</div>
</div>
