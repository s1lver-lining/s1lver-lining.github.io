{{- $name := .Get "name" -}}
{{- $path := .Get "path" -}}


<li class="hx:flex hx:list-none locallink">
  <a href="{{ $path }}" class="hx:inline-flex hx:cursor-default hx:items-center hx:py-1 hx:hover:opacity-60">
    {{- partial "utils/icon" (dict "name" "folder" "attributes" "width=1em") -}}
    <span class="hx:ml-1">{{ $name | markdownify }}</span>
  </a>
</li>
